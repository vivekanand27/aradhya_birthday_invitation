<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aradhya Birthday Video Invite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Great+Vibes&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="video-style.css" />
  </head>
  <body>
    <main class="video-stage">
      <section class="video-card" aria-label="Aradhya first birthday invitation">
        <div class="sparkles" aria-hidden="true">
          <span>✨</span>
          <span>🎈</span>
          <span>🎉</span>
          <span>✨</span>
        </div>

        <div class="hero-block">
          <img src="./img/image-15.jpeg" alt="Aradhya smiling in birthday cap" />
          <div class="hero-gradient"></div>
          <div class="hero-text">
            <p>You are warmly invited with your family to celebrate</p>
            <h1>Aradhya'S 1st Birthday</h1>
          </div>
        </div>

        <div class="details">
          <p><span>📅 Date</span><strong>25 March 2026</strong></p>
          <p><span>⏰ Time</span><strong>7 PM</strong></p>
          <p><span>📍 Venue</span><strong>1 BHK Side, Shramodaya Campus, Bhopal</strong></p>
          <p><span>📱 Contact</span><strong>8359806267</strong></p>
        </div>

        <p class="line">Join us for a joyful evening!</p>
        <p class="line strong">Your presence will make it special 🎈♥️</p>

        <div class="memory-row" aria-label="Photo memories">
          <img src="./img/image-3.jpeg" alt="Aradhya smiling in pink outfit" />
          <img src="./img/image-10.jpeg" alt="Aradhya in winter cap smiling" />
          <img src="./img/image-13.jpeg" alt="Aradhya in yellow dress" />
        </div>
      </section>
    </main>

    <script src="video-script.js"></script>
  </body>
</html>
